# tests/must-preserve/fixtures.yaml
# zh-human-writing v1 — must-preserve 测试用例
# 验证不应被修改的内容在编辑后保持不变。

test_cases:
  - test_id: "MP-001"
    description: "数字在编辑后不变"
    input:
      text: "系统响应时间为 100ms，在 2024 年 1 月 15 日的测试中，延迟降低了 30%。"
      source: "ai_draft"
      strategy: "balance"
      profile: "technical"
      length_retention: "balanced"
      output: "diff"
    expected:
      action: "可改写周围文字，但数字不变"
      prohibited_actions:
        - "将 100ms 改为 99ms"
        - "将 30% 改为 35%"
      must_preserve:
        - "100ms"
        - "30%"
        - "2024 年 1 月 15 日"
      allowed_changes:
        - "删除无信息提示层"
    judgment:
      method: "在终稿中搜索 '100ms'、'30%'，必须逐字存在"
      auto_check: "fidelity_guard.py 数字检查"
      manual_check: "无"

  - test_id: "MP-002"
    description: "数字被改变时检测到"
    input:
      text: "系统响应时间为 100ms。"
      source: "ai_draft"
      profile: "technical"
      output: "diff"
    expected:
      action: "fidelity_guard 输出 fail"
      prohibited_actions:
        - "将 100ms 改为 99ms"
      must_preserve:
        - "100ms"
      allowed_changes: []
    judgment:
      method: "fidelity_guard.py 检测到数字变化"
      auto_check: "fidelity_guard.py fail > 0"
      manual_check: "无"

  - test_id: "MP-003"
    description: "日期格式变化允许"
    input:
      text: "在 2024 年 1 月 15 日，系统上线。"
      source: "ai_draft"
      profile: "technical"
      output: "diff"
    expected:
      action: "日期格式可从 YYYY年M月D日 变为 YYYY-MM-DD"
      prohibited_actions:
        - "改变日期值"
      must_preserve:
        - "2024-01-15（等价）"
      allowed_changes:
        - "日期格式变化"
    judgment:
      method: "fidelity_guard.py 日期检查 pass"
      auto_check: "fidelity_guard.py fails=0"
      manual_check: "无"

  - test_id: "MP-004"
    description: "URL 不变"
    input:
      text: "详见 https://example.com/docs/api/v2"
      source: "ai_draft"
      profile: "technical"
      output: "diff"
    expected:
      action: "URL 逐字保留"
      prohibited_actions:
        - "改变 URL 路径"
      must_preserve:
        - "https://example.com/docs/api/v2"
      allowed_changes: []
    judgment:
      method: "fidelity_guard.py URL 检查 pass"
      auto_check: "fidelity_guard.py fails=0"
      manual_check: "无"

  - test_id: "MP-005"
    description: "URL 被改变时检测到"
    input:
      text: "详见 https://example.com/docs/api/v2"
      source: "ai_draft"
      profile: "technical"
      output: "diff"
    expected:
      action: "fidelity_guard 输出 fail"
      prohibited_actions:
        - "将 v2 改为 v3"
      must_preserve:
        - "https://example.com/docs/api/v2"
      allowed_changes: []
    judgment:
      method: "fidelity_guard.py 检测到 URL 变化"
      auto_check: "fidelity_guard.py fail > 0"
      manual_check: "无"

  - test_id: "MP-006"
    description: "行内代码不变"
