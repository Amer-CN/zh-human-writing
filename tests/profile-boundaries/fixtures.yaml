# tests/profile-boundaries/fixtures.yaml
# zh-human-writing v1 — profile-boundaries 测试用例
# 验证 profile 边界不被越界。

test_cases:
  - test_id: "PB-001"
    description: "technical profile 不报告步骤说明"
    input:
      text: "首先，安装 Node.js。然后，运行 npm install。最后，执行 npm start。"
      source: "ai_draft"
      strategy: "balance"
      profile: "technical"
      output: "diff"
    expected:
      action: "保留步骤说明"
      prohibited_actions:
        - "将步骤说明当作阶段递进结构壳删除"
        - "改变步骤顺序"
      must_preserve:
        - "首先，安装 Node.js"
        - "然后，运行 npm install"
        - "最后，执行 npm start"
      allowed_changes: []
    judgment:
      method: "步骤说明在终稿中逐字存在"
      auto_check: "pattern_audit.py pass"
      manual_check: "无"

