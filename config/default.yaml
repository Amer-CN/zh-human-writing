# config/default.yaml
# zh-human-writing v1 — 默认配置

meta:
  version: "1.0"

# 默认参数（与 input-contract.md 一致）
defaults:
  source: unknown
  strategy: null  # 由 source 推导
  profile: essay
  length_retention: balanced
  output: clean

# source → strategy 映射
source_strategy_mapping:
  author_written: preserve
  ai_draft: balance
  mixed: balance
  unknown: preserve

# 长度留存率阈值
length_retention_thresholds:
  strict: 0.90
  balanced: 0.80
  free: 0.00

# 模式聚集阈值
cluster_thresholds:
  strong_contextual: 2  # 同段 ≥2 次才标记
  consecutive_isomorphic: 3  # 连续 ≥3 个相同句式

# profile 调整系数
profile_adjustments:
  essay:
    strong_contextual_multiplier: 1.0
  technical:
    strong_contextual_multiplier: 1.5  # 导航和总结在技术文档中更合理
  social:
    strong_contextual_multiplier: 2.0  # 假互动在社媒中是常态
    short_sentence_check: false  # 短句不检测

# 保真检查
fidelity:
  deterministic_checks:
    - number
    - date
    - url
    - code
    - command
    - path
    - quote
    - user_protected
  warning_checks:
    - negation
    - condition
    - causation
    - responsibility
    - uncertainty
    - register_drift
    - voice_drift
  rollback_on_fail: true
  auto_retry: false

# 残留检查
residual_check:
  max_rounds: 1
  check_level: hard_residue_only

# 输出
output:
  max_audit_issues: 5
  benchmark_limitation_notice: true
